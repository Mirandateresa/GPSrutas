# render.yaml
services:
  - type: web
    name: gps-rutas-seguras
    runtime: python
    repo: https://github.com/Mirandateresa/GPSrutas.git
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: PORT
        value: 10000