<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS - Rutas Seguras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FAF5EF 0%, #EEDCC7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(92,64,51,0.15);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #5C4033;
            font-size: 2.5rem;
        }
        .subtitle {
            color: #8B7355;
            margin: 10px 0 20px;
        }
        .features {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .feature {
            background: #FAF5EF;
            padding: 8px 16px;
            border-radius: 20px;
            color: #5C4033;
            font-size: 0.9rem;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #B8865F;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #8B6B4A;
            transform: translateY(-2px);
        }
        .loading {
            margin-top: 15px;
            color: #8B7355;
        }
        .btn-secondary {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: #B8865F;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid #B8865F;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #B8865F;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 GPS</h1>
        <p class="subtitle">Rutas Seguras</p>
        
        <div class="features">
            <span class="feature">🛣️ Rutas optimizadas</span>
            <span class="feature">⚠️ Zonas de riesgo</span>
            <span class="feature">💰 Cálculo de costos</span>
        </div>

        <button class="btn" id="btnIniciar">
            🚀 Iniciar Viaje
        </button>
        
        <div id="loading" class="loading">Haz clic en el botón para comenzar</div>

        <br>
        <a href="/mapa.html" class="btn-secondary" id="btnAlternativo">
            🔄 Cargar mapa (versión estática)
        </a>
    </div>

    <script>
        document.getElementById('btnIniciar').addEventListener('click', function() {
            const loading = document.getElementById('loading');
            loading.textContent = '🔄 Cargando mapa...';
            
            // Intentar cargar el mapa desde la función
            window.location.href = '/.netlify/functions/api/mapa';
        });
    </script>
</body>
</html>
